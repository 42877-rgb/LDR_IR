<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background-color: #ffffff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); padding: 30px; width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #333333; margin-bottom: 20px; font-size: 24px; font-weight: 600; }
        .btn-start { background-color: #4CAF50; color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: 600; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(76, 175, 80, 0.2); margin-bottom: 20px; width: 100%; }
        .btn-start:hover { background-color: #45a049; transform: translateY(-2px); }
        .btn-start:disabled { background-color: #cccccc; cursor: not-allowed; }
        #webcam-container { margin: 20px auto; border-radius: 12px; overflow: hidden; width: 200px; height: 200px; background-color: #e0e0e0; display: flex; justify-content: center; align-items: center; border: 3px solid #fff; outline: 1px solid #ddd; position: relative; }
        #webcam-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #label-container { margin-top: 20px; text-align: left; }
        .label-row { background-color: #f8f9fa; border-left: 4px solid #007bff; padding: 12px 15px; margin-bottom: 8px; border-radius: 0 8px 8px 0; font-size: 15px; color: #495057; display: flex; justify-content: space-between; align-items: center; }
        .loading { position: absolute; font-size: 14px; color: #6c757d; font-style: italic; z-index: 1; }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <button type="button" class="btn-start" id="start-btn" onclick="init()">เริ่มเปิดกล้อง</button>
    <div id="webcam-container">
        <span class="loading" id="placeholder-text">ยังไม่ได้เปิดกล้อง</span>
        <video id="webcam-video" autoplay playsinline muted></video>
    </div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/flTyI50XI/";[cite: 3]
    let model, maxPredictions, videoElement, predictInterval;

    async function init() {
        const startBtn = document.getElementById("start-btn");
        const placeholderText = document.getElementById("placeholder-text");
        videoElement = document.getElementById("webcam-video");
        
        startBtn.disabled = true;
        startBtn.innerText = "กำลังโหลดโมเดล...";
        placeholderText.innerText = "กำลังเปิดกล้อง...";

        try {
            // 1. โหลดโมเดล AI
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");[cite: 3]
            maxPredictions = model.getTotalClasses();[cite: 3]

            // 2. เรียกเปิดกล้องตรง ๆ ด้วยมาตรฐานเว็บ (ไม่ใช้คำสั่งของ Teachable Machine)
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 200, height: 200, facingMode: "user" },
                audio: false
            });
            
            videoElement.srcObject = stream;
            placeholderText.style.display = "none";

            // 3. เตรียมหน้าจอแสดงผลลัพธ์
            labelContainer = document.getElementById("label-container");[cite: 3]
            labelContainer.innerHTML = ""; 
            for (let i = 0; i < maxPredictions; i++) {[cite: 3]
                const row = document.createElement("div");
                row.className = "label-row";
                labelContainer.appendChild(row);[cite: 3]
            }

            startBtn.innerText = "กำลังตรวจจับ...";

            // 4. สั่งทำนายผลทุก ๆ 3 วินาที (3000 มิลลิวินาที)
            if(predictInterval) clearInterval(predictInterval);
            predictInterval = setInterval(predict, 3000);
            
            predict(); // รันทันทีรอบแรก

        } catch (error) {
            console.error(error);
            alert("ไม่สามารถเปิดกล้องได้! ตรวจสอบสิทธิ์การอนุญาตกล้อง หรือคุณอาจจะยังไม่ได้เปิดใช้ HTTPS");
            startBtn.disabled = false;
            startBtn.innerText = "ลองใหม่อีกครั้ง";
            placeholderText.innerText = "เปิดกล้องล้มเหลว";
        }
    }

    async function predict() {
        if (!model || !videoElement) return;
        
        // ส่ง HTML5 Video ไปทำนายผลตรง ๆ
        const prediction = await model.predict(videoElement);[cite: 3]
        for (let i = 0; i < maxPredictions; i++) {[cite: 3]
            const className = prediction[i].className;[cite: 3]
            const probability = (prediction[i].probability * 100).toFixed(0) + "%"; 
            
            labelContainer.childNodes[i].innerHTML = `
                <strong>${className}</strong>
                <span>${probability}</span>
            `;
        }
    }
</script>
</body>
</html>
